<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Appointment Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 400px; height: 600px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .chat-header { background: #0077b6; color: #fff; padding: 16px; border-radius: 12px 12px 0 0; text-align: center; font-size: 18px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; white-space: pre-line; }
    .bot { background: #e9ecef; align-self: flex-start; }
    .user { background: #0077b6; color: #fff; align-self: flex-end; }
    .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .options button { background: #0077b6; color: #fff; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .options button:hover { background: #005f8a; }
    .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; }
    .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
    .chat-input button { margin-left: 8px; background: #0077b6; color: #fff; border: none; padding: 10px 16px; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">🩺 Doctor Appointment Booking</div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input id="msg" placeholder="Type your message..." onkeydown="if(event.key==='Enter')send()" />
      <button onclick="send()">Send Alok</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
  <script>
    const socket = io('http://65.0.122.33:4000');
    const messagesEl = document.getElementById('messages');

    socket.on('bot-message', (data) => {
      addMessage(data.text, 'bot');
      if (data.options && data.options.length > 0) {
        addOptions(data.options);
      }
    });

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addOptions(options) {
      const div = document.createElement('div');
      div.className = 'options';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.onclick = () => {
          div.remove();
          sendMessage(opt);
        };
        div.appendChild(btn);
      });
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function send() {
      const input = document.getElementById('msg');
      if (!input.value.trim()) return;
      sendMessage(input.value.trim());
      input.value = '';
    }

    function sendMessage(text) {
      addMessage(text, 'user');
      socket.emit('message', text);
    }
  </script>
</body>
</html>
